<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>文章チェッカー</title>

  <script src="https://unpkg.com/kuromoji@0.1.2/build/kuromoji.js"></script>

  <style>
body {
  background: #f4f4f4;
  margin: 0;
  padding: 16px;
}

h1 {
  font-size: 18px;
  margin-bottom: 12px;
}

textarea {
  width: 100%;
  height: 180px;
  border-radius: 12px;
  border: 1px solid #ddd;
  padding: 12px;
  font-size: 16px;
  box-sizing: border-box;
  background: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: #333;
  color: white;
  font-size: 16px;
}

button:disabled {
  background: #aaa;
}

#result {
  margin-top: 16px;
  padding: 12px;
  background: white;
  border-radius: 12px;
  white-space: pre-wrap;
  font-size: 14px;
  line-height: 1.6;
}
  </style>
</head>

<body>

  <h1>文章表現チェッカー</h1>

  <textarea id="text" placeholder="ここに文章を入力"></textarea>

  <br>

  <button id="btn" onclick="analyzeText()" disabled>
    読み込み中...
  </button>

  <div id="charCount"></div>

  <div id="result"></div>

<script>

function analyzeText() {

  const text = document.getElementById("text").value;

  // =========================
  // 文字数
  // =========================

  // 総文字数（改行込み）
  const totalCharCount = text.length;

  // 改行・空白除外文字数
  const pureCharCount =
    text.replace(/\s/g, "").length;

  document.getElementById("charCount").innerText =
    `総文字数：${totalCharCount}文字\n` +
    `改行・空白除外：${pureCharCount}文字`;

  if (!window.tokenizer) {
    document.getElementById("result").innerText =
      "形態素解析エンジンがまだ準備できていません";
    return;
  }

  const tokens = window.tokenizer.tokenize(text);

  // =========================
  // フレーズ辞書リスト
  // =========================
  const phraseRules = [

  // =========================
  // 比喩表現
  // =========================  
{ pattern: ["かの", "よう", "に"], label: "かのように", group: "比喩" },
{ pattern: ["かの", "よう", "な"], label: "かのような", group: "比喩" },
{ pattern: ["よう", "に"], label: "ように", group: "比喩" },
{ pattern: ["よう", "な"], label: "ような", group: "比喩" },
{ pattern: ["まるで"], label: "まるで", group: "比喩" },
{ pattern: ["さながら"], label: "さながら", group: "比喩" },
{ pattern: ["っぽい"], label: "っぽい", group: "比喩" },
{ pattern: ["風", "に"], label: "風に", group: "比喩" },
{ pattern: ["風", "な"], label: "風な", group: "比喩" },
{ pattern: ["を", "思わせる"], label: "を思わせる", group: "比喩" },
{ pattern: ["を", "彷彿", "と", "させる"], label: "を彷彿とさせる", group: "比喩" },

  // =========================
  // 断定
  // =========================
{ pattern: ["間違い", "ない"], label: "間違いない", group: "断定" },
{ pattern: ["間違い", "なく"], label: "間違いなく", group: "断定" },
{ pattern: ["絶対"], label: "絶対", group: "断定" },
{ pattern: ["絶対", "に"], label: "絶対に", group: "断定" },
{ pattern: ["確実"], label: "確実", group: "断定" },
{ pattern: ["確実", "に"], label: "確実に", group: "断定" },
{ pattern: ["必ず"], label: "必ず", group: "断定" },
{ pattern: ["必ず", "や"], label: "必ずや", group: "断定" },

  // =========================
  // 程度強調
  // =========================
{ pattern: ["非常", "に"], label: "非常に", group: "強調（程度）" },
{ pattern: ["とても"], label: "とても", group: "強調（程度）" },
{ pattern: ["かなり"], label: "かなり", group: "強調（程度）" },
{ pattern: ["ものすごく"], label: "ものすごく", group: "強調（程度）" },
{ pattern: ["実に"], label: "実に", group: "強調（程度）" },
{ pattern: ["まったく"], label: "まったく", group: "強調（程度）" },

  // =========================
  // 感情強調
  // =========================
{ pattern: ["まさに"], label: "まさに", group: "強調（感情・評価）" },
{ pattern: ["いかにも"], label: "いかにも", group: "強調（感情・評価）" },
{ pattern: ["確か", "に"], label: "確かに", group: "強調（感情・評価）" } ,

  // =========================
  // 否定強調（構文型）
  // =========================
  {
    type: "neg-struct",
    start: ["少しも"],
    end: ["ない"],
    label: "少しも〜ない",
    group: "否定強調"
  },
  {
    type: "neg-struct",
    start: ["微塵も"],
    end: ["ない"],
    label: "微塵も〜ない",
    group: "否定強調"
  },
  {
    type: "neg-struct",
    start: ["これっぽっちも"],
    end: ["ない"],
    label: "これっぽっちも〜ない",
    group: "否定強調"
  },
  {
    type: "neg-struct",
    start: ["かけらも"],
    end: ["ない"],
    label: "かけらも〜ない",
    group: "否定強調"
  },

  // =========================
  // 語尾表現
  // =========================
  { pattern: ["だ"], label: "だ", group: "語尾" },
  { pattern: ["です"], label: "です", group: "語尾" },
  { pattern: ["ます"], label: "ます", group: "語尾" },
  { pattern: ["だった"], label: "だった", group: "語尾" },
  { pattern: ["であった"], label: "であった", group: "語尾" },
  { pattern: ["なのだ"], label: "なのだ", group: "語尾" },
  { pattern: ["である"], label: "である", group: "語尾" },
  { pattern: ["のだ"], label: "のだ", group: "語尾" },
  { pattern: ["んだ"], label: "んだ", group: "語尾" },

  { pattern: ["だろう"], label: "だろう", group: "語尾（推量）" },
  { pattern: ["でしょう"], label: "でしょう", group: "語尾（推量）" },

  { pattern: ["じゃ", "ない", "か"], label: "じゃないか", group: "語尾（断定強め）" },
  { pattern: ["では", "ない", "か"], label: "ではないか", group: "語尾（断定強め）" },

  ];

  // =========================
  // ユーザー辞書リスト
  // =========================
const userDictionary = [
  "カラスバ",
  "ヒトデマン"
];



  const labelToGroup = {};
for (const rule of phraseRules) {
  labelToGroup[rule.label] = rule.group;
}

  // =========================
  // カウント用
  // =========================
  const wordCounts = {};
  const phraseCounts = {};
  const groupCounts = {};
  const endingCounts = {};

  const stopWords = [
    "の","に","は","を","た","が","で","て","と","し","れ","さ"
  ];

  // =========================
  // フレーズ検出
  // =========================
  for (let i = 0; i < tokens.length; i++) {

    for (const rule of phraseRules) {
         if (!rule.pattern) continue;

      let match = true;

      for (let j = 0; j < rule.pattern.length; j++) {
        if (tokens[i + j]?.surface_form !== rule.pattern[j]) {
          match = false;
          break;
        }
      }

      if (match) {

        phraseCounts[rule.label] =
          (phraseCounts[rule.label] || 0) + 1;

        groupCounts[rule.group] =
          (groupCounts[rule.group] || 0) + 1;
      }
    }
  }

  // =========================
  // 単語カウント
  // =========================
for (let i = 0; i < tokens.length; i++) {

  const word = tokens[i].surface_form;

  if (!word) continue;
  if (word.trim() === "") continue;
  if (/\s/.test(word)) continue;

  // =========================
  // ★ユーザー辞書チェック（重要）
  // =========================
  if (userDictionary.includes(word)) {
    wordCounts[word] =
      (wordCounts[word] || 0) + 1;

    // ★ここが超重要：辞書にヒットしたらその単語は終了
    continue;
  }

  // =========================
  // ★語尾カウント（追加）
  // =========================
  const endings = [
    "だ","です","ます",
    "だった","であった",
    "なのだ","である","のだ","んだ",
    "だろう","でしょう",
    "ある","である","いる"
  ];

 for (const end of endings) {

  const nextToken = tokens[i + 1]?.surface_form || "";

  // 次が句読点・改行・文末なら語尾扱い
  const isSentenceEnd =
    nextToken === "。" ||
    nextToken === "！" ||
    nextToken === "？" ||
    nextToken === "!" ||
    nextToken === "?" ||
    nextToken === "」" ||
    nextToken === "" ||
    nextToken === "\n";

  if (word === end && isSentenceEnd) {
    endingCounts[end] =
      (endingCounts[end] || 0) + 1;
  }
}

if (word.length <= 1) continue;
if (stopWords.includes(word)) continue;

  // =========================
  // ★分解語対策（これが本丸）
  // =========================
  let isPartOfUserWord = false;

  for (const dictWord of userDictionary) {
    if (dictWord.includes(word)) {
      isPartOfUserWord = true;
      break;
    }
  }

  if (isPartOfUserWord) {
    continue; // カラ・スバを捨てる
  }

  // =========================
  // 通常カウント
  // =========================
  wordCounts[word] =
    (wordCounts[word] || 0) + 1;
}

  // =========================
  // 表示
  // =========================
  let result = "";

  // フレーズ
for (const key in phraseCounts) {

  const groupName = labelToGroup[key];
  const groupCount = groupCounts[groupName] || 0;

  result += `${key}：${phraseCounts[key]}回（${groupName}：${groupCount}回）\n`;
}

result += "\n";

// =========================
// 語尾表示
// =========================
for (const [end, count] of Object.entries(endingCounts)) {
  result += `語尾「${end}」：${count}回\n`;
}

result += "\n";


  // 単語（多い順）
  const sorted = Object.entries(wordCounts)
    .sort((a, b) => b[1] - a[1]);

  for (const [word, count] of sorted) {
    if (count >= 2) {
      result += `${word}：${count}回\n`;
    }
  }

  document.getElementById("result").innerText =
    result || "重複なし";

}

// =========================
// kuromoji初期化
// =========================
window.onload = function () {

  const btn = document.getElementById("btn");

  kuromoji.builder({
    dicPath: "./dict/"
  }).build(function (err, tokenizer) {

    if (err) {
      console.error(err);
      document.getElementById("result").innerText =
        "辞書の読み込みに失敗しました";
      return;
    }

    window.tokenizer = tokenizer;

    btn.disabled = false;
    btn.innerText = "解析する";
  });
};

</script>

</html>
